<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Booksgalore — Treat your shelf!</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <button id="bookshelfBtn" class="bookshelf-btn" aria-label="Your Bookshelf">Your Bookshelf</button>

    <div class="search-spine" id="searchSpine">
      <input id="searchInput" class="search-input collapsed" placeholder="Search titles..." aria-label="Search books" />
    </div>
  </header>

  <div class="app-shell">
    <aside class="filters" id="filters">
      <button id="toggleFilters" class="close-filters">✕</button>
      <h3>Filters</h3>

      <label>Sort by
        <select id="sortBy">
          <option value="relevance">Relevance</option>
          <option value="year-desc">Year (Newest)</option>
          <option value="year-asc">Year (Oldest)</option>
        </select>
      </label>

      <label>Publication era
        <select id="era">
          <option value="any">Any</option>
          <option value="classic">Classic (pre-1950)</option>
          <option value="modern">Modern (1950–2000)</option>
          <option value="contemporary">Contemporary (2000+)</option>
        </select>
      </label>

      <label>Has cover image
        <input type="checkbox" id="hasCover" />
      </label>

      <label>Minimum editions
        <select id="minEditions">
          <option value="any">Any</option>
          <option value="2">2+</option>
          <option value="5">5+</option>
          <option value="10">10+</option>
        </select>
      </label>
    </aside>

    <main>
      <div class="controls">
        <button id="openFilters" class="open-filters" aria-label="Open filters">☰</button>
        <div id="viewTitle" class="view-title">Search</div>
      </div>

      <section id="results" class="results-grid" aria-live="polite"></section>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-panel" id="modalPanel">
      <button id="modalClose" class="modal-close">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
